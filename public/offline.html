<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>연결 상태 확인</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: calc(24px + env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
        background: radial-gradient(120% 120% at 50% 0%, #eef6ff 0%, #dfeefe 45%, #f8fbff 100%);
        color: #243241;
        touch-action: pan-x pan-y;
      }
      .card {
        width: min(440px, 100%);
        border: 1px solid #d7e5f5;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 18px 40px rgba(34, 62, 88, 0.16);
        padding: 28px 22px 20px;
        text-align: center;
      }
      .dot {
        width: 56px;
        height: 56px;
        border-radius: 999px;
        margin: 0 auto 14px;
        background: linear-gradient(135deg, #3d7be8, #2f5fc3);
        box-shadow: 0 8px 20px rgba(47, 95, 195, 0.3);
        position: relative;
      }
      .dot::after {
        content: "";
        position: absolute;
        inset: 16px;
        border-radius: 999px;
        border: 2.3px solid #fff;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.22;
        letter-spacing: -0.02em;
      }
      p {
        margin: 10px 0 0;
        color: #556679;
        font-size: 15px;
        line-height: 1.46;
      }
      .hint {
        margin-top: 14px;
        font-size: 13px;
        color: #73859a;
      }
      button {
        margin-top: 18px;
        width: 100%;
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        background: linear-gradient(135deg, #2f73e0, #255ec0);
        color: #fff;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }
      button:disabled {
        opacity: 0.65;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <div class="dot" aria-hidden="true"></div>
      <h1>인터넷 연결이 불안정해요</h1>
      <p>네트워크 상태를 확인한 뒤 다시 시도해주세요.</p>
      <p class="hint">Wi-Fi 또는 모바일 데이터 연결 후 버튼을 눌러주세요.</p>
      <button id="retryButton" type="button">다시 시도</button>
    </main>

    <script>
      const RETRY_URL = "https://www.bogopa.co.kr";
      const retryButton = document.getElementById("retryButton");

      function tryReconnect() {
        if (!retryButton) return;
        retryButton.disabled = true;
        retryButton.textContent = "다시 연결 중...";
        window.location.replace(`${RETRY_URL}/?native_retry=${Date.now()}`);
      }

      if (retryButton) {
        retryButton.addEventListener("click", tryReconnect);
      }

      window.addEventListener("online", tryReconnect);

      document.addEventListener(
        "gesturestart",
        function (event) {
          event.preventDefault();
        },
        { passive: false }
      );
      document.addEventListener(
        "gesturechange",
        function (event) {
          event.preventDefault();
        },
        { passive: false }
      );
      document.addEventListener(
        "gestureend",
        function (event) {
          event.preventDefault();
        },
        { passive: false }
      );
    </script>
  </body>
</html>
